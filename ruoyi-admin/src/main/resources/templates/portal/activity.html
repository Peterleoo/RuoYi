<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动报名 - 湖南老年人杂志社</title>
    <link rel="stylesheet" href="/portal/css/style.css">
</head>
<body class="font-medium">
<section class="page-title">
    <div class="container"><h1>活动报名</h1></div>
</section>
<section class="content-section">
    <div class="container">
        <div class="card">
            <h3 class="card-title">活动中心</h3>
            <div class="news-list" th:if="${!#lists.isEmpty(activities)}">
                <div class="news-item" th:each="activity : ${activities}">
                    <h4 th:text="${activity.activityName}">活动名称</h4>
                    <p class="date">
                        <span th:text="'状态：' + (activity.activityStatus == '0' ? '预热中' : (activity.activityStatus == '1' ? '进行中' : '已结束'))">状态：预热中</span>
                        <span style="margin-left:12px;" th:text="${activity.startTime != null ? #dates.format(activity.startTime,'yyyy-MM-dd HH:mm') : '未设置时间'}">未设置时间</span>
                    </p>
                    <p class="summary" th:text="${activity.activityContent} ?: '暂无活动详情'">暂无活动详情</p>
                    <p>地点：<span th:text="${activity.location} ?: '待定'">待定</span></p>
                    <p>报名：<span th:text="${activity.currentRegistrations} ?: 0">0</span>/<span th:text="${activity.capacity} ?: 0">0</span></p>
                </div>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(activities)}">
                <h5>暂无活动信息</h5>
                <p>请在后台“活动管理”中新增并发布活动。</p>
            </div>
            <p style="margin-top:16px;"><a class="btn btn-primary" href="/portal/member">前往会员中心报名</a></p>
        </div>
    </div>
</section>
<script src="/portal/js/font-control.js"></script>
<script src="/portal/js/a11y.js"></script>
</body>
</html>
