<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增活动')" />
    <th:block th:include="include :: summernote-css" />
    <style>
        .note-modal { z-index: 1051 !important; }
        .note-modal-backdrop { z-index: 1050 !important; }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-activity-add">
        <input type="hidden" id="activityContentInput" name="activityContent">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属学校：</label>
            <div class="col-sm-8">
                <select name="schoolId" class="form-control" required>
                    <option value="">请选择学校</option>
                    <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动名称：</label>
            <div class="col-sm-8">
                <input name="activityName" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动分类：</label>
            <div class="col-sm-8">
                <input name="category" class="form-control" type="text" placeholder="讲座/比赛/游学/演出">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动封面图：</label>
            <div class="col-sm-8">
                <input name="coverImage" class="form-control" type="text" placeholder="图片URL">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动详情：</label>
            <div class="col-sm-8">
                <div class="summernote"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">开始时间：</label>
            <div class="col-sm-8">
                <input name="startTime" class="form-control" type="datetime-local">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">结束时间：</label>
            <div class="col-sm-8">
                <input name="endTime" class="form-control" type="datetime-local">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">报名截止时间：</label>
            <div class="col-sm-8">
                <input name="registrationDeadline" class="form-control" type="datetime-local">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动地点：</label>
            <div class="col-sm-8">
                <input name="location" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">人数限制：</label>
            <div class="col-sm-8">
                <input name="capacity" class="form-control" type="number" min="0">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">当前报名人数：</label>
            <div class="col-sm-8">
                <input name="currentRegistrations" class="form-control" type="number" min="0" value="0">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动状态：</label>
            <div class="col-sm-8">
                <select name="activityStatus" class="form-control">
                    <option value="0">预热中</option>
                    <option value="1">进行中</option>
                    <option value="2">已结束</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" checked>
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: summernote-js" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/activity";

    if ($.fn.modal && $.fn.modal.Constructor) {
        $.fn.modal.Constructor.prototype.enforceFocus = function() {};
    }

    $(function() {
        $('.summernote').summernote({
            placeholder: '请输入活动详情',
            height: 240,
            lang: 'zh-CN'
        });
    });

    $("#form-activity-add").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            var html = $('.summernote').summernote('code');
            if (html && html.indexOf("data:image/") !== -1) {
                $.modal.alertError("检测到Base64图片，请先用上传按钮上传图片再提交");
                return;
            }
            $("#activityContentInput").val(html);
            $.operate.save(prefix + "/add", $('#form-activity-add').serialize());
        }
    }
</script>
</body>
</html>
