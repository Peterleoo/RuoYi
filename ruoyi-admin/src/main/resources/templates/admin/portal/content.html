<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('内容管理')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="form-content-search">
                    <div class="select-list">
                        <ul>
                            <li>
                                标题：<input type="text" name="title"/>
                            </li>
                            <li>
                                分类：<input type="text" name="category"/>
                            </li>
                            <li>
                                学校：<select name="schoolId">
                                <option value="">所有</option>
                                <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}"></option>
                            </select>
                            </li>
                            <li>
                                审核：<select name="auditStatus">
                                <option value="">所有</option>
                                <option value="0">待审</option>
                                <option value="1">通过</option>
                                <option value="2">驳回</option>
                            </select>
                            </li>
                            <li>
                                状态：<select name="status">
                                    <option value="">所有</option>
                                    <option value="0">正常</option>
                                    <option value="1">停用</option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>
            
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="portal:content:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-info" th:href="@{/admin/portal/content/category}" shiro:hasPermission="portal:contentCategory:view">
                    <i class="fa fa-tags"></i> 分类管理
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="portal:content:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="portal:content:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
            </div>
            
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('portal:content:edit')}]];
        var removeFlag = [[${@permission.hasPermi('portal:content:remove')}]];
        var prefix = ctx + "admin/portal/content";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                modalName: "内容",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'contentId',
                    title: '内容ID'
                },
                {
                    field: 'title',
                    title: '标题'
                },
                {
                    field: 'category',
                    title: '分类'
                },
                {
                    field: 'schoolName',
                    title: '学校'
                },
                {
                    field: 'subTitle',
                    title: '副标题'
                },
                {
                    field: 'author',
                    title: '作者'
                },
                {
                    field: 'auditStatus',
                    title: '审核状态',
                    formatter: function(value) {
                        if (value === '1') return '<span class="label label-success">通过</span>';
                        if (value === '2') return '<span class="label label-danger">驳回</span>';
                        return '<span class="label label-warning">待审</span>';
                    }
                },
                {
                    field: 'viewCount',
                    title: '浏览次数'
                },
                {
                    field: 'publishTime',
                    title: '发布时间'
                },
                {
                    field: 'status',
                    title: '状态',
                    formatter: function(value, row, index) {
                        return value === '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-danger">停用</span>';
                    }
                },
                {
                    field: 'createTime',
                    title: '创建时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.contentId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.contentId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
