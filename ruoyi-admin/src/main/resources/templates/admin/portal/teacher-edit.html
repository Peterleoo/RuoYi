<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改教师')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-teacher-edit" th:object="${teacher}">
        <input name="teacherId" type="hidden" th:field="*{teacherId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属学校：</label>
            <div class="col-sm-8">
                <select name="schoolId" class="form-control" required>
                    <option value="">请选择学校</option>
                    <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}" th:selected="${school.schoolId == teacher.schoolId}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">姓名：</label>
            <div class="col-sm-8">
                <input name="teacherName" class="form-control" type="text" th:field="*{teacherName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">照片：</label>
            <div class="col-sm-8">
                <input name="photo" class="form-control" type="text" th:field="*{photo}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">职称/头衔：</label>
            <div class="col-sm-8">
                <input name="title" class="form-control" type="text" th:field="*{title}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">擅长领域：</label>
            <div class="col-sm-8">
                <input name="expertise" class="form-control" type="text" th:field="*{expertise}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">个人简介：</label>
            <div class="col-sm-8">
                <textarea name="bio" class="form-control" rows="4" th:field="*{bio}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" th:checked="*{status} == '0'">
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1" th:checked="*{status} == '1'">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" th:field="*{remark}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/teacher";
    $("#form-teacher-edit").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-teacher-edit').serialize());
        }
    }
</script>
</body>
</html>
