<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>大学管理</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                                <i class="fa fa-wrench"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-user">
                                <li><a href="#">选项1</a> </li>
                                <li><a href="#">选项2</a> </li>
                            </ul>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <form id="form-university-search" class="form-inline">
                                    <div class="form-group">
                                        <label class="sr-only" for="universityName">大学名称</label>
                                        <input type="text" class="form-control" id="universityName" name="universityName" placeholder="大学名称">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="city">所在城市</label>
                                        <input type="text" class="form-control" id="city" name="city" placeholder="所在城市">
                                    </div>
                                    <div class="form-group">
                                        <label class="sr-only" for="status">状态</label>
                                        <select class="form-control" id="status" name="status">
                                            <option value="">所有状态</option>
                                            <option value="0">正常</option>
                                            <option value="1">停用</option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="btn-search">
                                        <i class="fa fa-search"></i> 搜索
                                    </button>
                                    <button type="button" class="btn btn-success" id="btn-add">
                                        <i class="fa fa-plus"></i> 新增
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover dataTables-example">
                                <thead>
                                    <tr>
                                        <th><input type="checkbox" id="checkAll" /></th>
                                        <th>大学ID</th>
                                        <th>大学名称</th>
                                        <th>所在城市</th>
                                        <th>联系方式</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="universityTableBody">
                                    <!-- 数据将通过JS动态加载 -->
                                </tbody>
                            </table>
                        </div>
                        <div class="row">
                            <div class="col-sm-6">
                                <div class="dataTables_info" id="DataTables_Table_0_info" role="status" aria-live="polite">
                                    显示 1 到 10 条，共 100 条
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="dataTables_paginate paging_simple_numbers" id="DataTables_Table_0_paginate">
                                    <ul class="pagination">
                                        <li class="paginate_button previous disabled"><a href="#">上一页</a></li>
                                        <li class="paginate_button active"><a href="#">1</a></li>
                                        <li class="paginate_button"><a href="#">2</a></li>
                                        <li class="paginate_button"><a href="#">3</a></li>
                                        <li class="paginate_button next"><a href="#">下一页</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        $(function() {
            // 初始化表格
            initTable();

            // 搜索按钮事件
            $('#btn-search').click(function() {
                initTable();
            });

            // 新增按钮事件
            $('#btn-add').click(function() {
                $.modal.open("新增大学", "${ctx}/admin/portal/university/add");
            });
        });

        function initTable() {
            var options = {
                url: "${ctx}/admin/portal/university/list",
                columns: [
                    {checkbox: true},
                    {field: 'universityId', title: '大学ID'},
                    {field: 'universityName', title: '大学名称'},
                    {field: 'city', title: '所在城市'},
                    {field: 'contactInfo', title: '联系方式'},
                    {field: 'status', title: '状态', formatter: function(value) {
                        return value === '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-danger">停用</span>';
                    }},
                    {field: 'operate', title: '操作', formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-primary btn-xs" href="javascript:;" onclick="editUniversity(' + row.universityId + ')"><i class="fa fa-edit"></i> 编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:;" onclick="deleteUniversity(' + row.universityId + ')"><i class="fa fa-trash"></i> 删除</a>');
                        return actions.join('');
                    }}
                ]
            };
            $('#universityTableBody').initTable(options);
        }

        function editUniversity(id) {
            $.modal.open("修改大学", "${ctx}/admin/portal/university/edit/" + id);
        }

        function deleteUniversity(id) {
            $.modal.confirm("确定要删除该大学吗？", function() {
                $.ajax({
                    url: "${ctx}/admin/portal/university/remove",
                    type: "post",
                    data: {universityIds: [id]},
                    success: function(result) {
                        if (result.code == 0) {
                            $.modal.alertSuccess(result.msg);
                            initTable();
                        } else {
                            $.modal.alertError(result.msg);
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
