<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增课程')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-course-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属学校：</label>
            <div class="col-sm-8">
                <select name="schoolId" class="form-control" required>
                    <option value="">请选择学校</option>
                    <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">课程名称：</label>
            <div class="col-sm-8">
                <input name="courseName" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">课程分类：</label>
            <div class="col-sm-8">
                <input name="courseCategory" class="form-control" type="text" placeholder="艺术/科技/养生...">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">讲师：</label>
            <div class="col-sm-8">
                <select name="teacherId" class="form-control">
                    <option value="">请选择讲师</option>
                    <option th:each="teacher : ${teachers}" th:value="${teacher.teacherId}" th:text="${teacher.teacherName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImage" class="form-control" type="text" placeholder="图片URL">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">课程简介：</label>
            <div class="col-sm-8">
                <textarea name="courseIntro" class="form-control" rows="3"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">上课时间安排：</label>
            <div class="col-sm-8">
                <textarea name="classSchedule" class="form-control" rows="3" placeholder="例如：每周二、四 09:00-10:30"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">录播视频链接：</label>
            <div class="col-sm-8">
                <input name="replayVideoUrl" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">学费：</label>
            <div class="col-sm-8">
                <input name="tuitionFee" class="form-control" type="number" step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">招生状态：</label>
            <div class="col-sm-8">
                <input name="enrollmentStatus" class="form-control" type="text" placeholder="招生中/已满额/暂停">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" checked>
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/course";
    $("#form-course-add").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-course-add').serialize());
        }
    }
</script>
</body>
</html>
