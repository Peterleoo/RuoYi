<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('活动管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="form-activity-search">
                <div class="select-list">
                    <ul>
                        <li>
                            活动名称：<input type="text" name="activityName"/>
                        </li>
                        <li>
                            所属学校：<select name="schoolId">
                            <option value="">所有</option>
                            <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}"></option>
                        </select>
                        </li>
                        <li>
                            活动分类：<input type="text" name="category"/>
                        </li>
                        <li>
                            活动状态：<select name="activityStatus">
                            <option value="">所有</option>
                            <option value="0">预热中</option>
                            <option value="1">进行中</option>
                            <option value="2">已结束</option>
                        </select>
                        </li>
                        <li>
                            状态：<select name="status">
                            <option value="">所有</option>
                            <option value="0">正常</option>
                            <option value="1">停用</option>
                        </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="portal:activity:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="portal:activity:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="portal:activity:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('portal:activity:edit')}]];
    var removeFlag = [[${@permission.hasPermi('portal:activity:remove')}]];
    var prefix = ctx + "admin/portal/activity";

    function formatActivityStatus(value) {
        if (value === '0') return '<span class="label label-warning">预热中</span>';
        if (value === '1') return '<span class="label label-success">进行中</span>';
        if (value === '2') return '<span class="label label-default">已结束</span>';
        return value || '-';
    }

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "活动",
            columns: [{
                checkbox: true
            },
            {
                field: 'activityId',
                title: 'ID'
            },
            {
                field: 'activityName',
                title: '活动名称'
            },
            {
                field: 'schoolName',
                title: '学校'
            },
            {
                field: 'category',
                title: '分类'
            },
            {
                field: 'startTime',
                title: '开始时间'
            },
            {
                field: 'endTime',
                title: '结束时间'
            },
            {
                field: 'activityStatus',
                title: '活动状态',
                formatter: function(value) {
                    return formatActivityStatus(value);
                }
            },
            {
                field: 'currentRegistrations',
                title: '当前报名'
            },
            {
                field: 'capacity',
                title: '人数限制'
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    return value === '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-danger">停用</span>';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.activityId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.activityId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
