<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改课程')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-course-edit" th:object="${course}">
        <input name="courseId" type="hidden" th:field="*{courseId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属学校：</label>
            <div class="col-sm-8">
                <select name="schoolId" class="form-control" required>
                    <option value="">请选择学校</option>
                    <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}" th:selected="${school.schoolId == course.schoolId}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">课程名称：</label>
            <div class="col-sm-8">
                <input name="courseName" class="form-control" type="text" th:field="*{courseName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">课程分类：</label>
            <div class="col-sm-8">
                <input name="courseCategory" class="form-control" type="text" th:field="*{courseCategory}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">讲师：</label>
            <div class="col-sm-8">
                <select name="teacherId" class="form-control">
                    <option value="">请选择讲师</option>
                    <option th:each="teacher : ${teachers}" th:value="${teacher.teacherId}" th:text="${teacher.teacherName}" th:selected="${teacher.teacherId == course.teacherId}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImage" class="form-control" type="text" th:field="*{coverImage}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">课程简介：</label>
            <div class="col-sm-8">
                <textarea name="courseIntro" class="form-control" rows="3" th:field="*{courseIntro}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">上课时间安排：</label>
            <div class="col-sm-8">
                <textarea name="classSchedule" class="form-control" rows="3" th:field="*{classSchedule}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">录播视频链接：</label>
            <div class="col-sm-8">
                <input name="replayVideoUrl" class="form-control" type="text" th:field="*{replayVideoUrl}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">学费：</label>
            <div class="col-sm-8">
                <input name="tuitionFee" class="form-control" type="number" step="0.01" th:field="*{tuitionFee}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">招生状态：</label>
            <div class="col-sm-8">
                <input name="enrollmentStatus" class="form-control" type="text" th:field="*{enrollmentStatus}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" th:checked="*{status} == '0'">
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1" th:checked="*{status} == '1'">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" th:field="*{remark}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/course";
    $("#form-course-edit").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-course-edit').serialize());
        }
    }
</script>
</body>
</html>
