<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改多媒体资源')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-media-edit" th:object="${media}">
        <input name="mediaId" type="hidden" th:field="*{mediaId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">标题：</label>
            <div class="col-sm-8">
                <input name="title" class="form-control" type="text" th:field="*{title}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">媒体类型：</label>
            <div class="col-sm-8">
                <select name="mediaType" class="form-control" th:field="*{mediaType}" required>
                    <option value="1">音频</option>
                    <option value="2">视频</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImage" class="form-control" type="text" th:field="*{coverImage}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">资源链接：</label>
            <div class="col-sm-8">
                <input name="mediaUrl" class="form-control" type="text" th:field="*{mediaUrl}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">时长：</label>
            <div class="col-sm-8">
                <input name="duration" class="form-control" type="text" th:field="*{duration}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">关联文章：</label>
            <div class="col-sm-8">
                <select name="articleId" class="form-control" th:field="*{articleId}">
                    <option value="">不关联</option>
                    <option th:each="article : ${articles}" th:value="${article.contentId}" th:text="${article.title}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">关联课程：</label>
            <div class="col-sm-8">
                <select name="courseId" class="form-control" th:field="*{courseId}">
                    <option value="">不关联</option>
                    <option th:each="course : ${courses}" th:value="${course.courseId}" th:text="${course.courseName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" th:checked="*{status} == '0'">
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1" th:checked="*{status} == '1'">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" th:field="*{remark}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/media";
    $("#form-media-edit").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-media-edit').serialize());
        }
    }
</script>
</body>
</html>
