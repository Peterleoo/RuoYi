<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header" />
    <th:block th:include="include :: summernote-css" />
    <th:block th:include="include :: summernote-js" />
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>修改内容</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <form class="form-horizontal m-t" id="form-content-edit">
                            <input type="hidden" name="contentId" th:value="${content.contentId}">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">标题：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" name="title" id="title" th:value="${content.title}" placeholder="请输入标题" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">分类：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" name="category" id="category" th:value="${content.category}" placeholder="请输入分类" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">作者：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" name="author" id="author" th:value="${content.author}" placeholder="请输入作者" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">摘要：</label>
                                <div class="col-sm-10">
                                    <textarea class="form-control" name="summary" id="summary" rows="3" placeholder="请输入摘要" th:text="${content.summary}"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">封面图片：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" name="coverImage" id="coverImage" th:value="${content.coverImage}" placeholder="请输入封面图片URL">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">内容：</label>
                                <div class="col-sm-10">
                                    <textarea class="form-control" name="content" id="content" rows="10" required th:text="${content.content}"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">状态：</label>
                                <div class="col-sm-10">
                                    <div class="radio radio-info radio-inline">
                                        <input type="radio" id="status0" name="status" value="0" th:checked="${content.status == '0'}">
                                        <label for="status0"> 正常 </label>
                                    </div>
                                    <div class="radio radio-inline">
                                        <input type="radio" id="status1" name="status" value="1" th:checked="${content.status == '1'}">
                                        <label for="status1"> 停用 </label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">备注：</label>
                                <div class="col-sm-10">
                                    <textarea class="form-control" name="remark" id="remark" rows="3" placeholder="请输入备注" th:text="${content.remark}"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-2">
                                    <button class="btn btn-primary" type="submit">保存</button>
                                    <button class="btn btn-white" type="button" onclick="closeModal()">取消</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        $(function() {
            // 初始化富文本编辑器
            $('#content').summernote({
                height: 300,
                placeholder: '请输入内容',
                lang: 'zh-CN'
            });

            // 表单验证
            $('#form-content-edit').validate({
                rules: {
                    title: {
                        required: true,
                        maxlength: 255
                    },
                    category: {
                        required: true,
                        maxlength: 50
                    },
                    author: {
                        required: true,
                        maxlength: 50
                    },
                    content: {
                        required: true
                    }
                },
                messages: {
                    title: {
                        required: "请输入标题",
                        maxlength: "标题不能超过255个字符"
                    },
                    category: {
                        required: "请输入分类",
                        maxlength: "分类不能超过50个字符"
                    },
                    author: {
                        required: "请输入作者",
                        maxlength: "作者不能超过50个字符"
                    },
                    content: {
                        required: "请输入内容"
                    }
                },
                submitHandler: function(form) {
                    $.ajax({
                        url: "${ctx}/admin/portal/content/edit",
                        type: "post",
                        data: $(form).serialize(),
                        success: function(result) {
                            if (result > 0) {
                                $.modal.alertSuccess("保存成功");
                                $.modal.close();
                                parent.initTable();
                            } else {
                                $.modal.alertError("保存失败");
                            }
                        }
                    });
                }
            });
        });

        function closeModal() {
            $.modal.close();
        }
    </script>
</body>
</html>
