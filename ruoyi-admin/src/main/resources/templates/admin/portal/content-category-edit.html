<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改内容分类')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-content-category-edit" th:object="${category}">
        <input name="categoryId" type="hidden" th:field="*{categoryId}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">分类名称：</label>
            <div class="col-sm-8">
                <input name="categoryName" class="form-control" type="text" th:field="*{categoryName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="col-sm-8">
                <input name="sortNum" class="form-control" type="number" th:field="*{sortNum}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" th:checked="*{status} == '0'">
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1" th:checked="*{status} == '1'">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" th:field="*{remark}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "admin/portal/content/category";
    $("#form-content-category-edit").validate({ focusCleanup: true });
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-content-category-edit').serialize());
        }
    }
</script>
</body>
</html>
