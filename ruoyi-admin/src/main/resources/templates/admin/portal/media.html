<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('多媒体资源管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="form-media-search">
                <div class="select-list">
                    <ul>
                        <li>
                            标题：<input type="text" name="title"/>
                        </li>
                        <li>
                            类型：<select name="mediaType">
                            <option value="">所有</option>
                            <option value="1">音频</option>
                            <option value="2">视频</option>
                        </select>
                        </li>
                        <li>
                            状态：<select name="status">
                            <option value="">所有</option>
                            <option value="0">正常</option>
                            <option value="1">停用</option>
                        </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="portal:media:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="portal:media:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="portal:media:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('portal:media:edit')}]];
    var removeFlag = [[${@permission.hasPermi('portal:media:remove')}]];
    var prefix = ctx + "admin/portal/media";

    function formatType(value) {
        if (value === '1') return '<span class="label label-info">音频</span>';
        if (value === '2') return '<span class="label label-primary">视频</span>';
        return value || '-';
    }

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "多媒体资源",
            columns: [{
                checkbox: true
            },
            {
                field: 'mediaId',
                title: 'ID'
            },
            {
                field: 'title',
                title: '标题'
            },
            {
                field: 'mediaType',
                title: '类型',
                formatter: function(value) {
                    return formatType(value);
                }
            },
            {
                field: 'articleTitle',
                title: '关联文章'
            },
            {
                field: 'courseName',
                title: '关联课程'
            },
            {
                field: 'duration',
                title: '时长'
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    return value === '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-danger">停用</span>';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.mediaId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.mediaId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
