<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增内容')" />
    <th:block th:include="include :: summernote-css" />
    <style>
        .note-modal {
            z-index: 1051 !important;
        }
        .note-modal-backdrop {
            z-index: 1050 !important;
        }
    </style>
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-content-add">
            <input type="hidden" id="contentHtmlInput" name="content">
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">标题：</label>
                <div class="col-sm-8">
                    <input name="title" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">分类：</label>
                <div class="col-sm-8">
                    <input name="category" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">分类ID：</label>
                <div class="col-sm-8">
                    <input name="categoryId" class="form-control" type="number">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所属学校：</label>
                <div class="col-sm-8">
                    <select name="schoolId" class="form-control">
                        <option value="">请选择学校</option>
                        <option th:each="school : ${schools}" th:value="${school.schoolId}" th:text="${school.schoolName}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">副标题：</label>
                <div class="col-sm-8">
                    <input name="subTitle" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">封面图：</label>
                <div class="col-sm-8">
                    <input name="coverImage" class="form-control" type="text" placeholder="图片URL">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">来源：</label>
                <div class="col-sm-8">
                    <input name="source" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">作者：</label>
                <div class="col-sm-8">
                    <input name="author" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">摘要：</label>
                <div class="col-sm-8">
                    <textarea name="summary" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">内容详情：</label>
                <div class="col-sm-8">
                    <div class="summernote" id="contentEditor"></div>
                    <div style="margin-top: 10px;">
                        <div class="input-group">
                            <span class="input-group-addon">媒体类型</span>
                            <select class="form-control" id="mediaType">
                                <option value="video">视频</option>
                                <option value="audio">音频</option>
                                <option value="pdf">PDF</option>
                            </select>
                            <span class="input-group-addon">媒体URL</span>
                            <input id="mediaUrl" class="form-control" type="text" placeholder="可粘贴媒体地址或先上传文件">
                            <span class="input-group-btn">
                                <button class="btn btn-default" type="button" onclick="insertMediaByUrl()">插入正文</button>
                            </span>
                        </div>
                        <div class="input-group" style="margin-top: 8px;">
                            <span class="input-group-addon">上传媒体</span>
                            <input id="mediaFile" class="form-control" type="file" accept="video/*,audio/*,.pdf">
                            <span class="input-group-btn">
                                <button class="btn btn-primary" type="button" onclick="uploadMediaFile()">上传并回填URL</button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">审核状态：</label>
                <div class="col-sm-8">
                    <select name="auditStatus" class="form-control">
                        <option value="0">待审</option>
                        <option value="1">通过</option>
                        <option value="2">驳回</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">发布时间：</label>
                <div class="col-sm-8">
                    <input name="publishTime" class="form-control" type="datetime-local">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="status0" name="status" value="0" checked>
                        <label for="status0">正常</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="status1" name="status" value="1">
                        <label for="status1">停用</label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: summernote-js" />
    <script th:inline="javascript">
        var prefix = ctx + "admin/portal/content";

        // 修复在 layer 弹层内使用 summernote 时，链接/图片/视频弹窗被遮罩和焦点劫持的问题
        if ($.fn.modal && $.fn.modal.Constructor) {
            $.fn.modal.Constructor.prototype.enforceFocus = function() {};
        }

        $(function() {
            $('.summernote').summernote({
                placeholder: '请输入内容，支持图文混排与媒体链接',
                height: 280,
                lang: 'zh-CN',
                callbacks: {
                    onImageUpload: function(files) {
                        sendFile(files[0], this, "image");
                    }
                }
            });
        });

        function sendFile(file, obj, type) {
            var data = new FormData();
            data.append("file", file);
            data.append("type", type);
            $.ajax({
                type: "POST",
                url: ctx + "common/upload",
                data: data,
                cache: false,
                contentType: false,
                processData: false,
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        if (type === "image") {
                            $(obj).summernote('editor.insertImage', result.url, result.fileName);
                        } else {
                            $("#mediaUrl").val(result.url);
                            $.modal.msgSuccess("上传成功，请点击“插入正文”");
                        }
                    } else {
                        $.modal.alertError(result.msg);
                    }
                },
                error: function() {
                    $.modal.alertError("上传失败");
                }
            });
        }

        function uploadMediaFile() {
            var fileInput = document.getElementById("mediaFile");
            if (!fileInput.files || fileInput.files.length === 0) {
                $.modal.msgWarning("请先选择媒体文件");
                return;
            }
            sendFile(fileInput.files[0], null, "media");
        }

        function insertMediaByUrl() {
            var url = $.common.trim($("#mediaUrl").val());
            var type = $("#mediaType").val();
            if (!url) {
                $.modal.msgWarning("请先填写或上传媒体URL");
                return;
            }
            var html = "";
            if (type === "video") {
                html = '<p><video controls style="max-width:100%;"><source src="' + url + '"></video></p>';
            } else if (type === "audio") {
                html = '<p><audio controls style="width:100%;"><source src="' + url + '"></audio></p>';
            } else {
                html = '<p><a href="' + url + '" target="_blank">查看PDF文件</a></p>';
            }
            $('.summernote').summernote('pasteHTML', html);
        }

        $("#form-content-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $("#contentHtmlInput").val($('.summernote').summernote('code'));
                var formData = new FormData(document.getElementById("form-content-add"));
                $.ajax({
                    url: prefix + "/add",
                    type: "post",
                    dataType: "json",
                    data: formData,
                    processData: false,
                    contentType: false,
                    beforeSend: function(xhr, settings) {
                        var csrftoken = $('meta[name=csrf-token]').attr('content');
                        if ($.common.equalsIgnoreCase(settings.type, "POST")) {
                            xhr.setRequestHeader("X-CSRF-Token", csrftoken);
                        }
                        $.modal.loading("正在处理中，请稍候...");
                        $.modal.disable();
                    },
                    success: function(result) {
                        $.operate.successCallback(result);
                    },
                    error: function() {
                        $.modal.closeLoading();
                        $.modal.alertError("提交失败，请重试");
                    }
                });
            }
        }
    </script>
</body>
</html>
