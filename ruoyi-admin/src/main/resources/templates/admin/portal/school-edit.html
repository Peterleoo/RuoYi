<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改学校')" />
    <th:block th:include="include :: select2-css" />
    <th:block th:include="include :: summernote-css" />
    <style>
        .note-modal { z-index: 1051 !important; }
        .note-modal-backdrop { z-index: 1050 !important; }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-school-edit" th:object="${school}">
        <input name="schoolId" type="hidden" th:field="*{schoolId}">
        <input type="hidden" id="enrollmentBrochureInput" name="enrollmentBrochure" th:value="*{enrollmentBrochure}">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">学校名称：</label>
            <div class="col-sm-8">
                <input name="schoolName" class="form-control" type="text" th:field="*{schoolName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">所属部门：</label>
            <div class="col-sm-8">
                <select id="deptId" name="deptId" class="form-control select2-select" th:field="*{deptId}">
                    <option value="">请选择所属部门</option>
                    <option th:each="dept : ${deptList}" th:value="${dept.deptId}" th:text="${dept.deptName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Logo：</label>
            <div class="col-sm-8">
                <input name="logo" class="form-control" type="text" th:field="*{logo}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImage" class="form-control" type="text" th:field="*{coverImage}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">学校简介：</label>
            <div class="col-sm-8">
                <textarea name="introduction" class="form-control" rows="3" th:field="*{introduction}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">地址：</label>
            <div class="col-sm-8">
                <input name="address" class="form-control" type="text" th:field="*{address}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">经度：</label>
            <div class="col-sm-3">
                <input name="longitude" class="form-control" type="text" th:field="*{longitude}">
            </div>
            <label class="col-sm-2 control-label">纬度：</label>
            <div class="col-sm-3">
                <input name="latitude" class="form-control" type="text" th:field="*{latitude}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">联系电话：</label>
            <div class="col-sm-8">
                <input name="contactPhone" class="form-control" type="text" th:field="*{contactPhone}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">交通指南：</label>
            <div class="col-sm-8">
                <textarea name="transportGuide" class="form-control" rows="3" th:field="*{transportGuide}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">招生简章：</label>
            <div class="col-sm-8">
                <div class="summernote" id="enrollmentEditor"></div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <div class="radio-box">
                    <input type="radio" id="status0" name="status" value="0" th:checked="*{status} == '0'">
                    <label for="status0">正常</label>
                </div>
                <div class="radio-box">
                    <input type="radio" id="status1" name="status" value="1" th:checked="*{status} == '1'">
                    <label for="status1">停用</label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" th:field="*{remark}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: select2-js" />
<th:block th:include="include :: summernote-js" />
<script>
    var prefix = ctx + "admin/portal/school";
    if ($.fn.modal && $.fn.modal.Constructor) {
        $.fn.modal.Constructor.prototype.enforceFocus = function() {};
    }

    $(function() {
        $('#deptId').select2({
            placeholder: "请选择所属部门",
            allowClear: true,
            width: '100%'
        });
        $('.summernote').summernote({
            placeholder: '请输入招生简章',
            height: 220,
            lang: 'zh-CN'
        });
        $('.summernote').summernote('code', $("#enrollmentBrochureInput").val());
    });

    $("#form-school-edit").validate({ focusCleanup: true });

    function submitHandler() {
        if ($.validate.form()) {
            var html = $('.summernote').summernote('code');
            if (html && /data:[^;]+;base64,/i.test(html)) {
                $.modal.alertError("检测到Base64资源，请先使用上传功能并插入URL后再提交");
                return;
            }
            $("#enrollmentBrochureInput").val(html);
            $.operate.save(prefix + "/edit", $('#form-school-edit').serialize());
        }
    }
</script>
</body>
</html>
